[colors]
bg = #2e3440
bg-alt = #3b4252
bg-dim = #434c5e
bg-focus = #4c566a
fg = #eceff4
fg-dark = #e5e9f0
fg-dim = #d8dee9
muted = #4c566a
blue = #81a1c1
cyan = #88c0d0
teal = #8fbcbb
magenta = #b48ead
green = #a3be8c
yellow = #ebcb8b
red = #bf616a
orange = #d08770
accent = #5e81ac

[bar/main]
width = 100%
height = 28
radius = 0
bottom = false
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
line-size = 2
line-color = ${colors.accent}
border-size = 0
padding-left = 0
padding-right = 1
module-margin = 0
separator =
font-0 = JetBrainsMono Nerd Font:size=9;2
font-1 = JetBrainsMono Nerd Font:style=Bold:size=9;2
font-2 = JetBrainsMono Nerd Font:size=10;2
font-3 = JetBrainsMono Nerd Font:size=10;2
font-4 = Noto Color Emoji:scale=10;2
modules-left = brand i3 xwindow
modules-center =
modules-right = vpn sep eth sep filesystem sep cpu sep memory sep date tray sep powermenu
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

[module/pad]
type = custom/text
label = " "

[module/sep]
type = custom/text
label = "|"
label-foreground = ${colors.muted}

[module/brand]
type = custom/text
label = "%{T2}%{T3}%{T-} Tessa%{T-}"
label-foreground = ${colors.bg}
label-background = ${colors.blue}
label-padding = 1
click-left = rofi -show drun -config ~/.config/rofi/config.rasi
click-right = rofi -show window -config ~/.config/rofi/config.rasi

[module/i3]
type = internal/i3
pin-workspaces = true
index-sort = true
strip-wsnumbers = true
enable-scroll = true
wrapping-scroll = false
format = <label-state>
label-focused = "%{T3}%{T-}"
label-focused-foreground = ${colors.cyan}
label-focused-padding = 1
label-unfocused = "%{T3}%{T-}"
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding = 1
label-visible = "%{T3}%{T-}"
label-visible-foreground = ${colors.fg-dim}
label-visible-padding = 1
label-urgent = "%{T3}%{T-}"
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
format = <label>
format-foreground = ${colors.fg-dim}
format-padding = 0
label = %title:0:50:...%
label-empty =
label-empty-foreground = ${colors.muted}

[module/vpn]
type = custom/script
exec = ~/.config/polybar/vpn-status.sh
interval = 5
click-left = ~/.config/polybar/copy-vpn-ip.sh
click-right = ~/.config/polybar/open-network.sh
format = <label>
format-underline = ${colors.green}
format-padding = 1
label-foreground = ${colors.fg}

[module/eth]
type = internal/network
interface-type = wired
interval = 5
click-left = ~/.config/polybar/open-network.sh
click-right = ~/.config/polybar/copy-local-ip.sh
format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-connected-underline = ${colors.cyan}
format-connected-padding = 1
format-disconnected-padding = 1
label-connected = %{F#88c0d0}%{T3}%{T-}%{F-}  %local_ip%
label-connected-foreground = ${colors.fg}
label-disconnected = %{F#4c566a}%{T3}%{T-}%{F-}  down
label-disconnected-foreground = ${colors.muted}

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
click-left = ~/.config/polybar/open-root.sh
format-mounted = <label-mounted>
format-mounted-underline = ${colors.yellow}
format-mounted-padding = 1
format-unmounted = <label-unmounted>
format-unmounted-padding = 1
label-mounted = %{F#ebcb8b}%{T3}%{T-}%{F-}  %percentage_used%%
label-mounted-foreground = ${colors.fg}
label-unmounted = %{T3}%{T-}  n/a
label-unmounted-foreground = ${colors.muted}

[module/cpu]
type = internal/cpu
interval = 2
click-left = ~/.config/polybar/open-monitor.sh
format = <label>
format-underline = ${colors.blue}
format-padding = 1
label = %{F#81a1c1}%{T3}%{T-}%{F-}  %percentage%%
label-foreground = ${colors.fg}

[module/memory]
type = internal/memory
interval = 2
click-left = ~/.config/polybar/open-monitor.sh
format = <label>
format-underline = ${colors.magenta}
format-padding = 1
label = %{F#b48ead}%{T3}%{T-}%{F-}  %percentage_used%%
label-foreground = ${colors.fg}

[module/date]
type = internal/date
interval = 1
date = %{F#5e81ac}%{T3}%{T-}%{F-}  %a %d %b   %{F#5e81ac}%{T3}%{T-}%{F-}  %H:%M
click-left = ~/.config/polybar/open-calendar.sh
format = <label>
format-underline = ${colors.accent}
format-padding = 1
label = %date%
label-foreground = ${colors.fg}

[module/powermenu]
type = custom/text
label = "%{T3}%{T-}"
label-foreground = ${colors.red}
label-padding = 1
click-left = ~/.config/polybar/powermenu.sh

[module/tray]
type = internal/tray
format-background = ${colors.bg}
format-margin = 4pt
tray-spacing = 6pt

[settings]
screenchange-reload = true
pseudo-transparency = true
