[colors]
bg = #2e3440
bg-alt = #3b4252
bg-dim = #434c5e
bg-focus = #4c566a
fg = #eceff4
fg-dark = #e5e9f0
muted = #81a1c1
blue = #81a1c1
cyan = #88c0d0
magenta = #b48ead
good = #a3be8c
warn = #ebcb8b
bad = #bf616a
line = #5e81ac

[bar/main]
width = 100%
height = 24
radius = 0
bottom = false
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
line-size = 1
line-color = ${colors.line}
border-size = 0
padding-left = 0
padding-right = 0
module-margin = 0
separator =
font-0 = JetBrains Mono:size=9;2
font-1 = JetBrains Mono:style=Bold:size=9;2
font-2 = Noto Color Emoji:size=9;2
modules-left = brand brand-gap i3 xwindow
modules-center =
modules-right = vpn sep eth sep filesystem sep cpu sep memory sep date tray
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

[module/brand]
type = custom/text
label = Tessa-V3.0
label-foreground = ${colors.bg}
label-background = ${colors.blue}
label-padding = 1

[module/brand-gap]
type = custom/text
label = " "
label-background = ${colors.bg}

[module/sep]
type = custom/text
label = "·"
label-foreground = ${colors.muted}
label-padding = 1

[module/i3]
type = internal/i3
pin-workspaces = true
index-sort = true
strip-wsnumbers = true
enable-scroll = true
wrapping-scroll = false
format = <label-state>
ws-icon-0 = 1;I
ws-icon-1 = 2;II
ws-icon-2 = 3;III
ws-icon-3 = 4;IV
ws-icon-default = •
label-focused = %icon%
label-focused-foreground = ${colors.blue}
label-focused-background = ${colors.bg-focus}
label-focused-underline = ${colors.blue}
label-focused-padding = 1
label-unfocused = %icon%
label-unfocused-foreground = ${colors.muted}
label-unfocused-background = ${colors.bg}
label-unfocused-padding = 1
label-visible = %icon%
label-visible-foreground = ${colors.fg-dark}
label-visible-background = ${colors.bg-focus}
label-visible-underline = ${colors.line}
label-visible-padding = 1
label-urgent = %icon%
label-urgent-foreground = ${colors.bad}
label-urgent-background = ${colors.bad}
label-urgent-underline = ${colors.bad}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
format = <label>
format-background = ${colors.bg-alt}
format-foreground = ${colors.fg}
format-underline = ${colors.cyan}
format-padding = 1
label = %title:0:42:...%
label-foreground = ${colors.fg}
label-empty = Desktop
label-empty-foreground = ${colors.muted}

[module/vpn]
type = custom/script
exec = ~/.config/polybar/vpn-status.sh
interval = 5
click-left = ~/.config/polybar/copy-vpn-ip.sh
click-right = ~/.config/polybar/open-network.sh
format = <label>
format-background = ${colors.bg-alt}
format-underline = ${colors.good}
format-padding = 1
label-foreground = ${colors.fg}

[module/eth]
type = internal/network
interface-type = wired
interval = 5
click-left = ~/.config/polybar/open-network.sh
click-right = ~/.config/polybar/copy-local-ip.sh
format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-connected-background = ${colors.bg-alt}
format-connected-underline = ${colors.cyan}
format-connected-padding = 1
format-disconnected-background = ${colors.bg-alt}
format-disconnected-underline = ${colors.line}
format-disconnected-padding = 1
label-connected = ETH [%local_ip%]
label-connected-foreground = ${colors.fg}
label-disconnected = ETH [down]
label-disconnected-foreground = ${colors.muted}

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
click-left = ~/.config/polybar/open-root.sh
format-mounted = <label-mounted>
format-mounted-background = ${colors.bg-alt}
format-mounted-underline = ${colors.warn}
format-mounted-padding = 1
format-unmounted = <label-unmounted>
format-unmounted-background = ${colors.bg-alt}
format-unmounted-underline = ${colors.line}
format-unmounted-padding = 1
label-mounted = DSK [%percentage_used%%]
label-mounted-foreground = ${colors.fg}
label-unmounted = DSK [na]
label-unmounted-foreground = ${colors.muted}

[module/cpu]
type = internal/cpu
interval = 2
click-left = ~/.config/polybar/open-monitor.sh
format = <label>
format-background = ${colors.bg-alt}
format-underline = ${colors.blue}
format-padding = 1
label = CPU [%percentage%%]
label-foreground = ${colors.fg}

[module/memory]
type = internal/memory
interval = 2
click-left = ~/.config/polybar/open-monitor.sh
format = <label>
format-background = ${colors.bg-alt}
format-underline = ${colors.magenta}
format-padding = 1
label = RAM [%percentage_used%%]
label-foreground = ${colors.fg}

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d %H:%M:%S
click-left = ~/.config/polybar/open-calendar.sh
format = <label>
format-background = ${colors.bg-alt}
format-underline = ${colors.magenta}
format-padding = 1
label = TIME [%date%]
label-foreground = ${colors.fg}

[module/tray]
type = internal/tray
format-background = ${colors.bg-alt}
format-margin = 2pt
tray-spacing = 4pt

[settings]
screenchange-reload = true
pseudo-transparency = true
