# picom config - Nord / VM-safe
# xrender backend for best KVM/QEMU compatibility; no blur

backend = "xrender";
vsync = false;

# Shadows
shadow = false;
shadow-radius = 7;
shadow-opacity = 0.4;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@"
];

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-exclude = [];

# Opacity
inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
  "100:class_g = 'Rofi'",
  "100:class_g = 'i3lock'"
];

# Blur - disabled for VM performance
blur-background = false;

# Rounded corners - disabled for performance
corner-radius = 0;

# Misc
mark-wmwin-focused = true;
mark-osd-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";
